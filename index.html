<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Anima Argenta - Bolívar 1936</title>
  <style>
    body {
      background-color: #111;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: start;
      min-height: 100vh;
      margin: 0;
      padding-top: 30px;
    }

    .titulo {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #999;
      text-align: center;
      letter-spacing: 1px;
    }

    .contenedor {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      max-width: 90vw;
    }

    .imagen-enlace img {
      max-width: 70vw;
      max-height: 60vh;
      border: 1px solid #555;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
      cursor: zoom-in;
    }

    .pie {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      margin-top: 5px;
      max-width: 80vw;
    }

    footer {
      margin-top: auto;
      padding: 20px 0 10px 0;
      text-align: center;
      opacity: 0.4;
    }

    .iconos a {
      margin: 0 10px;
      display: inline-block;
    }

    .iconos img {
      width: 22px;
      height: 22px;
      filter: grayscale(1) brightness(0.8);
      transition: filter 0.3s;
    }

    .iconos img:hover {
      filter: brightness(1.2);
    }
  </style>
</head>
<body>
  <div class="titulo">ANIMA ARGENTA</div>

  <div class="contenedor">
    <a class="imagen-enlace" href="bolivar1936.png" target="_blank">

    </a>
    <div class="pie">

    </div>
  </div>

        <img src="https://cryptologos.cc/logos/stellar-xlm-logo.png?v=026" alt="Stellar">
      </a>
      <a href="https://github.com/cCDragosh/animaargenta-site" target="_blank">
