<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anima Argenta Vault</title>
  <style>
    body {
      background-color: #111;
      color: #ddd;
      font-family: "Segoe UI", sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 400;
      margin: 40px 0 20px 0;
      letter-spacing: 2px;
      text-align: center;
    }

    .nft-gallery {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      width: 100%;
    }

    .nft-gallery img {
      max-width: 320px;
      width: 90%;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
    }

    a {
      margin: 20px;
      color: #61dafb;
      text-decoration: none;
      font-size: 0.95rem;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Anima Argenta Vault</h1>

  <div class="nft-gallery">
    <img src="nfts/bolivar1936.png" alt="NFT Bolívar 1936" />

</html>
