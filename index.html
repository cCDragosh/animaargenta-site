<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Anima Argenta - Bolívar 1936</title>
  <style>
    body {
      background-color: #111;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: start;
      min-height: 100vh;
      margin: 0;
      padding-top: 30px;
    }
    .titulo {
      font-size: 1.2rem; /* reducido */
      margin-bottom: 20px;
      color: #999;
      text-align: center;
      letter-spacing: 1px;
    }
    .contenedor {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      max-width: 90vw;
    }
    img {
      max-width: 70vw;
      max-height: 60vh;
      border: 1px solid #555;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
    }
    .pie {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      margin-top: 5px;
      max-width: 80vw;
    }
  </style>
</head>
<body>
  <div class="titulo">ANIMA ARGENTA</div>

  <div class="contenedor">
    <img src="bolivar1936.png" alt="Bolívar 1936">
    <div class="pie">
      Esta imagen fue preservada y expuesta por Drago — animaargenta.com
    </div>
  </div>
</body>
</html>
