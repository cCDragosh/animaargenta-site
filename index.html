<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Anima Argenta</title>
  <meta name="description" content="Anima Argenta es el proyecto de Drago, donde preserva y expone piezas únicas con ayuda de Kael. Descubre símbolos, memoria y valor reunidos en este espacio.">
  <style>
    body {
      background-color: #111;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: start;
      min-height: 100vh;
      margin: 0;
      padding-top: 30px;
    }
    .titulo {
      font-size: 1.2rem;
      margin-bottom: 20px;
      color: #999;
      text-align: center;
      letter-spacing: 1px;
    }
    .contenedor {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      max-width: 90vw;
    }
    .imagen-enlace img {
      max-width: 70vw;
      max-height: 60vh;
      border: 1px solid #555;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
      cursor: zoom-in;
    }
    .pie {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      margin-top: 5px;
      max-width: 80vw;
    }
    footer {
      margin-top: auto;
      padding: 20px 0 10px 0;
      text-align: center;
      opacity: 0.4;
    }
    .iconos a {
      margin: 0 10px;
      display: inline-block;
    }
    .iconos img {
      width: 22px;
      height: 22px;
      filter: grayscale(1) brightness(0.8);
      transition: filter 0.3s;
    }
    .iconos img:hover {
      filter: brightness(1.2);
    }
  </style>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="titulo">ANIMA ARGENTA</div>

  <div class="contenedor">
    <a class="imagen-enlace" href="nfts/bolivar1936.png" target="_blank">
  <img src="nfts/bolivar1936.png" alt="Bolívar 1936">
</a>
    <div class="pie">
  Imagen: Bolívar 1936<br>
  Esta imagen fue preservada y expuesta por Drago — animaargenta.com (con ayuda de Kael).
</div>
  </div>

  <footer>
    <div class="iconos">
      <a href="https://stellar.expert/explorer/public/account/GDJOJHTYWFRRXD3CEFJ7TRBHHQ7EQYKWU7NOXNICTYJG47A3EALY2SXK" target="_blank">
        <img src="https://cryptologos.cc/logos/stellar-xlm-logo.png?v=026" alt="Stellar">
      </a>
      <a href="https://github.com/cCDragosh/animaargenta-site" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub">
      </a>
      <a href="mailto:drago@animaargenta.com">
        <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png" alt="Email">
      </a>
    </div>
  </footer>
  <div class="flip-container">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="nfts/bolivar1936-front.png" alt="Bolívar 1936 Frente">
    </div>
    <div class="flip-back">
      <img src="nfts/bolivar1936-back.png" alt="Bolívar 1936 Reverso">
    </div>
  </div>
</div>
</body>
</html>
