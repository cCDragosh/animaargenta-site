<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anima Argenta Vault</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ddd;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      margin: 0;
      min-height: 100vh;
      justify-content: center;
    }

    h1 {
      color: #f0f0f0;
      margin-bottom: 30px;
      text-align: center;
      letter-spacing: 1px;
      font-size: 2rem;
      line-height: 1.3;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
    }

    img {
      width: 300px;
      max-width: 90%;
      border-radius: 15px;
      margin-bottom: 25px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      object-fit: cover;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    img:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.6);
    }

    .nft-gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    a {
      color: #61dafb;
      text-decoration: none;
      margin-top: 20px;
      font-size: 1rem;
      font-weight: bold;
      transition: color 0.3s ease;
    }

    a:hover {
      text-decoration: underline;
      color: #1fa1f2;
    }
  </style>
</head>
<body>
  <h1>Anima Argenta<br>Vault</h1>

  <div class="nft-gallery">
    <img src="nfts/bolivar1936.png" alt="NFT Bolívar 1936" />
  </div>

  <a href="nfts/">Ver NFTs</a>
</body>
</html>
