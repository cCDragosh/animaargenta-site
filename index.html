<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anima Argenta Vault</title>
  <style>
    body {
      background-color: #111;
      color: #ccc;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    h1 {
      color: silver;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 1px;
      font-size: 1.8rem;
      line-height: 1.2;
    }

    img {
      width: 280px;
      max-width: 90%;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    .nft-gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .nft-gallery img {
      width: 180px;
    }

    a {
      color: #61dafb;
      text-decoration: none;
      margin-top: 20px;
      font-size: 1rem;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Anima Argenta<br>Vault</h1>

  <div class="nft-gallery">
    <img src="nfts/bolivar1936.png" alt="NFT Bolívar 1936" />
  </div>

  <a href="nfts/">Ver NFTs</a>
</body>
</html>
